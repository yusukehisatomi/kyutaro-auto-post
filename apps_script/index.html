<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X投稿ネタ登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #1a1a1a; }
    .hint { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
    textarea {
      width: 100%;
      height: 200px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #1d9bf0; }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
      background: #1d9bf0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .success { background: #e6f4ea; color: #2e7d32; }
    .error   { background: #fdecea; color: #c62828; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📋 X投稿ネタ登録</h1>
    <p class="hint">
      Claudeが生成した投稿ネタを貼り付けてください。<br>
      <strong>1行 = 1投稿</strong>として、明日から1日1件ずつ自動でスケジュールされます。
    </p>
    <textarea id="posts" placeholder="おはようございます！今日も頑張りましょう。#朝活&#10;読書で成長しよう！#自己成長&#10;失敗を恐れずチャレンジ！#成長"></textarea>
    <button id="btn" onclick="submit()">スプレッドシートに追加する</button>
    <div id="result"></div>
  </div>

  <script>
    function submit() {
      const text = document.getElementById('posts').value.trim();
      if (!text) {
        showResult('投稿ネタを入力してください。', false);
        return;
      }
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '追加中...';

      google.script.run
        .withSuccessHandler(function(count) {
          showResult(count + '件をスプレッドシートに追加しました！', true);
          document.getElementById('posts').value = '';
          btn.disabled = false;
          btn.textContent = 'スプレッドシートに追加する';
        })
        .withFailureHandler(function(err) {
          showResult('エラーが発生しました：' + err.message, false);
          btn.disabled = false;
          btn.textContent = 'スプレッドシートに追加する';
        })
        .addPosts(text);
    }

    function showResult(msg, success) {
      const el = document.getElementById('result');
      el.textContent = msg;
      el.className = success ? 'success' : 'error';
      el.style.display = 'block';
    }
  </script>
</body>
</html>
