<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="X投稿管理">
  <title>X投稿ネタ管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1d9bf0;
      --green: #2e7d32;
      --red: #c62828;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 0;
    }
    header {
      background: var(--blue);
      color: white;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 22px; }
    .container { padding: 16px; max-width: 640px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 15px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
    textarea {
      width: 100%;
      height: 180px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
      color: var(--text);
    }
    textarea:focus { border-color: var(--blue); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
    .hint code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-secondary { background: #f0f0f0; color: var(--text); font-size: 14px; padding: 10px; }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
      line-height: 1.5;
    }
    .alert.success { background: #e8f5e9; color: var(--green); }
    .alert.error   { background: #ffebee; color: var(--red); }
    input[type="date"],
    input[type="password"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      margin-top: 8px;
    }
    input:focus { border-color: var(--blue); }
    .token-status { font-size: 13px; margin-top: 8px; }
    .token-status.ok { color: var(--green); }
    .token-status.ng { color: var(--red); }
    .preview { margin-top: 12px; font-size: 13px; color: var(--muted); }
    .preview-item {
      background: #f8f8f8;
      border-left: 3px solid var(--blue);
      padding: 6px 10px;
      margin: 4px 0;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <span>📋</span>
  <h1>X投稿ネタ管理</h1>
</header>

<div class="container">

  <!-- トークン設定 -->
  <div class="card">
    <h2>⚙️ GitHub設定</h2>
    <div id="tokenStatus" class="token-status ng">トークン未設定</div>
    <input type="password" id="tokenInput" placeholder="GitHub Personal Access Token">
    <button class="btn btn-secondary" onclick="saveToken()">保存</button>
    <div class="hint" style="margin-top:8px;">
      初回のみ設定。<a href="https://github.com/settings/tokens/new?scopes=workflow&description=x-auto-post" target="_blank">ここ</a>でトークンを発行（scopeは<code>workflow</code>を選択）
    </div>
  </div>

  <!-- 投稿済みにする -->
  <div class="card">
    <h2>✅ 投稿済みにする</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">手動でXに投稿した後、この日付の行をposted=TRUEにします。</p>
    <input type="date" id="targetDate">
    <button class="btn btn-secondary" onclick="setToday()" style="margin-top:8px;">今日の日付にリセット</button>
    <button class="btn btn-primary" id="markBtn" onclick="markPosted()" style="background:#2e7d32;">投稿済みにする</button>
    <div id="markResult" class="alert"></div>
  </div>

  <!-- 投稿ネタを追加 -->
  <div class="card">
    <h2>✍️ 投稿ネタを追加</h2>
    <textarea id="posts" placeholder="Claudeが生成したネタを貼り付け&#10;&#10;例）&#10;おはようございます！#朝活|読書で成長しよう！#自己成長|失敗を恐れずチャレンジ！#成長"></textarea>
    <div class="hint">
      <code>|</code> で区切ると複数まとめて追加できます。明日から1日1件ずつ自動でスケジュールされます。
    </div>
    <div id="preview" class="preview"></div>
    <button class="btn btn-primary" id="addBtn" onclick="addPosts()">スプレッドシートに追加</button>
    <div id="result" class="alert"></div>
  </div>

</div>

<script>
  const OWNER = 'yusukehisatomi';
  const REPO  = 'kyutaro-auto-post';

  function loadToken() {
    const t = localStorage.getItem('gh_token');
    const statusEl = document.getElementById('tokenStatus');
    if (t) {
      document.getElementById('tokenInput').value = t;
      statusEl.textContent = '✅ トークン設定済み';
      statusEl.className = 'token-status ok';
    } else {
      statusEl.textContent = '⚠️ トークン未設定';
      statusEl.className = 'token-status ng';
    }
    return t;
  }

  function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) { alert('トークンを入力してください'); return; }
    localStorage.setItem('gh_token', t);
    loadToken();
  }

  document.getElementById('posts').addEventListener('input', updatePreview);
  function updatePreview() {
    const text = document.getElementById('posts').value.trim();
    const previewEl = document.getElementById('preview');
    if (!text) { previewEl.innerHTML = ''; return; }
    const lines = text.replace(/\n/g, '|').split('|').filter(l => l.trim());
    if (lines.length === 0) { previewEl.innerHTML = ''; return; }
    previewEl.innerHTML = `<div style="margin-bottom:4px;font-weight:600;">${lines.length}件を追加予定：</div>` +
      lines.map(l => `<div class="preview-item">${l.trim()}</div>`).join('');
  }

  async function dispatchWorkflow(workflow, inputs) {
    const token = loadToken();
    if (!token) return null;
    return fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${workflow}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main', inputs }),
      }
    );
  }

  async function addPosts() {
    if (!loadToken()) { showResult('先にGitHubトークンを設定してください。', 'error'); return; }
    const posts = document.getElementById('posts').value.trim();
    if (!posts) { showResult('投稿ネタを入力してください。', 'error'); return; }
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = '追加中...';
    try {
      const res = await dispatchWorkflow('add_posts.yml', { posts });
      if (res.status === 204) {
        showResult('✅ 追加を開始しました！約30秒後にスプレッドシートを確認してください。', 'success');
        document.getElementById('posts').value = '';
        document.getElementById('preview').innerHTML = '';
      } else if (res.status === 401) {
        showResult('❌ トークンが無効です。再設定してください。', 'error');
      } else {
        const body = await res.json();
        showResult('❌ エラー: ' + (body.message || res.status), 'error');
      }
    } catch (e) { showResult('❌ 通信エラー: ' + e.message, 'error'); }
    btn.disabled = false; btn.textContent = 'スプレッドシートに追加';
  }

  async function markPosted() {
    if (!loadToken()) { showMarkResult('先にGitHubトークンを設定してください。', 'error'); return; }
    const targetDate = document.getElementById('targetDate').value;
    if (!targetDate) { showMarkResult('日付を選択してください。', 'error'); return; }
    const btn = document.getElementById('markBtn');
    btn.disabled = true; btn.textContent = '処理中...';
    try {
      const res = await dispatchWorkflow('mark_posted.yml', { target_date: targetDate });
      if (res.status === 204) {
        showMarkResult(`✅ ${targetDate} の投稿を投稿済みにしました！`, 'success');
      } else if (res.status === 401) {
        showMarkResult('❌ トークンが無効です。再設定してください。', 'error');
      } else {
        const body = await res.json();
        showMarkResult('❌ エラー: ' + (body.message || res.status), 'error');
      }
    } catch (e) { showMarkResult('❌ 通信エラー: ' + e.message, 'error'); }
    btn.disabled = false; btn.textContent = '投稿済みにする';
  }

  function showResult(msg, type) {
    const el = document.getElementById('result');
    el.textContent = msg; el.className = 'alert ' + type; el.style.display = 'block';
  }
  function showMarkResult(msg, type) {
    const el = document.getElementById('markResult');
    el.textContent = msg; el.className = 'alert ' + type; el.style.display = 'block';
  }

  function setToday() {
    document.getElementById('targetDate').value = new Date().toLocaleDateString('sv-SE');
  }
  setToday();
  loadToken();
</script>
</body>
</html>
